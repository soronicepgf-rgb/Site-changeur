<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soronice Hub - Déverrouillage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           RÉINITIALISATION DE BASE
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* =========================================
           ARRIÈRE-PLAN ANIMÉ (Style Delta)
           ========================================= */
        body {
            background: linear-gradient(135deg, #0f0f13, #1c1c24, #0a0a0d, #252530);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* =========================================
           CONTENEUR PRINCIPAL (La Carte)
           ========================================= */
        .card-container {
            background-color: rgba(30, 30, 36, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* =========================================
           IMAGE D'EN-TÊTE
           ========================================= */
        .header-image {
            width: 100%;
            height: 250px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* =========================================
           TEXTES
           ========================================= */
        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* =========================================
           BOUTONS D'ACTION (BASE)
           ========================================= */
        .action-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #2979FF, #4FC3F7);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(41, 121, 255, 0.3);
            text-decoration: none;
        }

        .action-button:hover:not(.clicked):not(.done) {
            background: linear-gradient(135deg, #3d84ff, #64cdff);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(41, 121, 255, 0.5);
        }

        .action-button:active:not(.clicked):not(.done) {
            transform: translateY(1px);
        }

        .emoji-icon {
            font-size: 1.2em;
        }

        /* =========================================
           ÉTATS DES BOUTONS (CLIC ET TERMINÉ)
           ========================================= */
        /* Quand on clique dessus (Grisé avec pointeur désactivé) */
        .action-button.clicked {
            background: #2c2c35;
            color: #888899;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
            border: 2px solid #3a3a45;
        }

        /* Quand le minuteur est fini (Vert foncé) */
        .action-button.done {
            background: #1b3320;
            color: #00e676;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
            border: 2px solid #00e676;
        }

        /* =========================================
           ANIMATION DU MINUTEUR
           ========================================= */
        .timer-container {
            position: relative;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .timer-text {
            position: relative;
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            z-index: 2;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* =========================================
           SECTION PROGRESSION
           ========================================= */
        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 12px;
            padding: 0 5px;
        }

        .progress-text {
            font-size: 13px;
            color: #d0d0e0;
            font-weight: 600;
        }

        .progress-badge {
            background-color: #00e676;
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #00e676;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* =========================================
           BOUTON DE DÉVERROUILLAGE
           ========================================= */
        .unlock-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            background-color: #2c2c35;
            color: #6a6a7c;
            border: 2px solid #3a3a45;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .unlock-button.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            pointer-events: auto;
        }

        .unlock-button.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5);
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        <img src="https://images.unsplash.com/photo-1505635552518-3448ff116af3?q=80&w=1000&auto=format&fit=crop" alt="Image Sombre" class="header-image">
        
        <h1 class="title">
            <span>🔐</span> Mots de passe SORONICE HUB
        </h1>
        <p class="subtitle">Terminez les actions pour débloquer</p>

        <a href="https://linkvertise.com/?publisherClosed=true&affiliate_id=2633396" target="_blank" class="action-button pub-btn">
            <span class="emoji-icon">🌐</span>
            Regardez la pub
        </a>

        <a href="https://shrinkme.click/SDyqbx" target="_blank" class="action-button pub-btn">
            <span class="emoji-icon">🌐</span>
            Regardez la pub
        </a>

        <a href="https://shrinkme.click/h0TtBvi" target="_blank" class="action-button pub-btn">
            <span class="emoji-icon">🌐</span>
            Regardez la pub
        </a>

        <div class="progress-section">
            <span class="progress-text">Déverrouiller le progrès</span>
            <span class="progress-badge">0/3 terminé</span>
        </div>
        
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>

        <a href="#" class="unlock-button" id="final-unlock">
            <i class="fa-solid fa-lock"></i>
            Lien de déverrouillage
        </a>

    </div>

    <script>
        const pubButtons = document.querySelectorAll('.pub-btn');
        const progressBadge = document.querySelector('.progress-badge');
        const progressBarFill = document.querySelector('.progress-bar-fill');
        const finalUnlockBtn = document.getElementById('final-unlock');
        
        let completedCount = 0;
        const totalCount = pubButtons.length;
        const waitSeconds = 45; // Temps d'attente en secondes

        pubButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                if (this.classList.contains('clicked') || this.classList.contains('done')) {
                    return;
                }

                this.classList.add('clicked');
                
                this.innerHTML = `
                    <div class="timer-container">
                        <div class="spinner"></div>
                        <span class="timer-text">${waitSeconds}</span>
                    </div>
                    Vérification en cours...
                `;

                let timeLeft = waitSeconds;
                const textElement = this.querySelector('.timer-text');

                const timerInterval = setInterval(() => {
                    timeLeft--;
                    
                    if (timeLeft > 0) {
                        textElement.textContent = timeLeft;
                    } else {
                        clearInterval(timerInterval);
                        
                        this.classList.remove('clicked');
                        this.classList.add('done');
                        this.innerHTML = `<span class="emoji-icon">✅</span> Terminé`;
                        
                        completedCount++;
                        updateProgress();
                    }
                }, 1000);
            });
        });

        function updateProgress() {
            progressBadge.textContent = `${completedCount}/${totalCount} terminé`;
            
            const percentage = (completedCount / totalCount) * 100;
            progressBarFill.style.width = `${percentage}%`;

            if (completedCount === totalCount) {
                finalUnlockBtn.classList.add('active');
                finalUnlockBtn.innerHTML = `<i class="fa-solid fa-unlock"></i> Accéder au Script`;
                finalUnlockBtn.href = "https://link-hub.net/2633396/gpJ5h5q7GVZ6"; 
            }
        }
    </script>
</body>
</html>
